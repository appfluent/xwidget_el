    sdk: flutter
  intl: ">=0.17.0 <0.21.0"
  logging: ^1.3.0
  petitparser: ^7.0.1
  type_plus: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  args: ^2.7.0